<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="logo_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Shape -->
  <rect width="440" height="440" x="36" y="36" rx="100" fill="url(#logo_grad)" />
  
  <!-- Stylized Graduation Cap -->
  <g filter="url(#shadow)">
    <!-- Cap Diamond -->
    <path d="M256 140L410 215L256 290L102 215L256 140Z" fill="white" />
    <!-- Cap Base -->
    <path d="M160 250V310C160 310 190 340 256 340C322 340 352 310 352 310V250L256 300L160 250Z" fill="white" opacity="0.9" />
    <!-- Tassel -->
    <path d="M410 215V295C410 295 400 315 390 315C380 315 370 295 370 295" stroke="white" stroke-width="12" stroke-linecap="round" />
    <circle cx="390" cy="325" r="15" fill="white" />
  </g>
  
  <!-- "V" Accent for ViệtHub -->
  <path d="M236 380L256 400L276 380" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
</svg>