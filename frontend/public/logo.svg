<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="logo_grad_main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow_main" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
      <feOffset dx="0" dy="8" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded Container -->
  <rect width="460" height="460" x="26" y="26" rx="120" fill="url(#logo_grad_main)" />
  
  <!-- Icon Group -->
  <g filter="url(#shadow_main)">
    <!-- Graduation Cap Diamond -->
    <path d="M256 120L430 210L256 300L82 210L256 120Z" fill="white" />
    <!-- Cap Base -->
    <path d="M140 260V340C140 340 180 380 256 380C332 380 372 340 372 340V260L256 320L140 260Z" fill="white" />
    <!-- Tassel Detail -->
    <path d="M430 210V300" stroke="white" stroke-width="16" stroke-linecap="round" />
    <circle cx="430" cy="320" r="22" fill="white" />
  </g>
</svg>
